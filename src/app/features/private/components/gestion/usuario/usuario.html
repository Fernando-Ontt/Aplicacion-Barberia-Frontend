<div class="mt-5">
  <app-header-usuario (search)="onSearch($event)"></app-header-usuario>
</div>

<div class="mt-5">
  <app-filtrar-users
    (apply)="onApplyFilters($event)"
    (clear)="onClearFilters()">
  </app-filtrar-users>
</div>

<div *ngIf="errorCarga" class="mt-4 rounded-lg border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-200">
  {{ errorCarga }}
</div>

<div class="mt-5">
  <app-table-users
    [usuarios]="usuarios"
    [totalElements]="totalElements"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    [pageSize]="10"
    (prev)="onPrevPage()"
    (next)="onNextPage()">
  </app-table-users>
</div>
