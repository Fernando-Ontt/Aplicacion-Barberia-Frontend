<div class="flex justify-center p-6">
  <p-card 
    class="shadow-3 border-round-xl overflow-hidden transition-all transition-duration-300 hover:shadow-6 carta"
    [style]="{ width: '22rem' }"
  >

    <!-- 🖼️ Imagen -->
    <ng-template #header>
      <div class="relative">
        <img
          alt="Card"
          class="w-full h-56 object-cover"
          [src]="producto.imagenes?.[1] || '/imagenes/default-hotel.png'"
        />

        <!-- Badge publicado -->
        <span 
          *ngIf="producto.publicado"
          class="absolute top-2 right-2 bg-green-500 text-white px-2 py-1 text-xs border-round"
        >
          Disponible
        </span>
      </div>
    </ng-template>

    <!-- 📝 Título -->
    <ng-template #title>
      <div class="text-lg font-semibold text-900 line-clamp-1">
        {{ producto.nombre }}
      </div>
    </ng-template>

    <!-- 📄 Descripción -->
    <ng-template #subtitle>
      <div class="text-sm text-600 line-clamp-2">
        {{ producto.descripcion }}
      </div>
    </ng-template>

    <!-- 💰 Precio -->
    <div class="mt-3 flex justify-between items-center">
      <span class="text-xl font-bold text-primary">
        {{ producto.precio | currency:'USD' }}
      </span>

      <span class="text-sm text-500">
        Stock: {{ producto.stock }}
      </span>
    </div>

    <!-- 🔘 Botones -->
    <ng-template #footer>
      <div class="flex gap-2 mt-4">
        
        <button 
          pButton 
          label="Ver" 
          icon="pi pi-eye"
          [routerLink]="['/productos', producto.id]"
          class="p-button-outlined w-full"
        ></button>

        <button 
          pButton 
          label="Reservar" 
          icon="pi pi-shopping-cart"
          class="p-button-primary w-full"
        ></button>

      </div>
    </ng-template>

  </p-card>
</div>
